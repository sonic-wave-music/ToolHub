<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Удаление пробелов из текста онлайн. Удалите лишние пробелы из текста бесплатно.">
    <meta name="keywords" content="удаление пробелов, убрать пробелы, очистка текста, онлайн инструмент">
    <meta name="author" content="SonicWave Studio">
    <meta name="robots" content="index, follow">
    
    <title>Удаление Пробелов — ToolHub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="../index.html" class="nav-logo">
                <span class="logo-icon"><i class="fas fa-cube"></i></span>
                <span class="logo-text">ToolHub</span>
            </a>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="../index.html" class="nav-link">Главная</a></li>
                <li><a href="../tools.html" class="nav-link active">Инструменты</a></li>
                <li><a href="../about.html" class="nav-link">О нас</a></li>
                <li><a href="../contact.html" class="nav-link">Контакты</a></li>
            </ul>
            <button class="nav-toggle" id="nav-toggle"><span class="hamburger"></span></button>
        </div>
    </nav>

    <main class="tool-page">
        <div class="container">
            <div class="tool-page-header">
                <h1>Удаление Пробелов</h1>
                <p>Удалите все пробелы из текста</p>
            </div>

            <div class="tool-interface">
                <div class="form-group">
                    <label>Входной текст</label>
                    <textarea id="spaces-input" placeholder="Введите текст с пробелами..." style="min-height:100px;"></textarea>
                </div>
                <button class="btn btn-primary" id="remove-spaces">Удалить Пробелы</button>
                <div class="form-group" style="margin-top:15px;">
                    <label>Результат</label>
                    <textarea id="spaces-output" readonly style="min-height:100px;"></textarea>
                </div>
                <button class="btn btn-success" id="copy-spaces" style="margin-top:10px;">Копировать</button>
            </div>

            <div class="tool-info">
                <h2>О Инструменте</h2>
                <p>Удаляет все пробельные символы из текста.</p>
                <ul>
                    <li>✓ Удаление всех пробелов</li>
                    <li>✓ Удаление табуляции</li>
                    <li>✓ Копирование результата</li>
                </ul>
            </div>
        </div>
    </main>
